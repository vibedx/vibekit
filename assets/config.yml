# VibeKit Configuration
# Created: 2025-05-27

project:
  name: ""
  description: ""

tickets:
  path: ".vibe/tickets"
  id_format: "TKT-{number}"
  default_template: ".vibe/.templates/default.md"
  use_status_folders: false
  status_options:
    - open
    - ready
    - in_progress
    - review
    - done
  priority_options:
    - low
    - medium
    - high
    - critical

docs:
  path: ".vibe/docs"
  id_format: "DOC-{number}"
  default_template: ".vibe/.templates/docs/default.md"
  default_type: guide
  status_options:
    - draft
    - review
    - published

team:
  path: .vibe/team.yml

agent:
  timeout: 900

swarm:
  maxAgents: 3
  timeout: 900

ai:
  enabled: false

hooks:
  pre_commit: false
  post_checkout: false

review:
  acceptance_threshold: 80
  good_threshold: 80
  warning_threshold: 60