# VibeKit Team Configuration
# Add team members here. Use their ID as the assignee value in tickets.
#
# Usage:
#   vibe team                              - List all members
#   vibe team add <id> --name "Name" ...   - Add a member
#   vibe team remove <id>                  - Remove a member
#   vibe new "task" --assignee <id>        - Assign ticket to member
#
# No need to edit this file manually — use the CLI commands above.
# But if you prefer to edit directly, just add entries under `members:`
# like this:
#
#   members:
#     jane-doe:
#       name: Jane Doe
#       github: jane-doe
#       slack: U04ABC12DEF
#       x: janedoe
#       role: Founder
#     john-smith:
#       name: John Smith
#       github: john-smith
#       slack: U05XYZ34GHI
#       x: johnsmith
#       role: Engineer

members: {}
